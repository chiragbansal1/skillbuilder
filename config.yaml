# SkillForge configuration
#
# Swap providers by changing values here. No code changes required.

llm:
  # Swapped to gemini as requested by user
  provider: gemini
  model: gemini-2.5-flash

  # Uncomment when switching to firm_internal:
  # provider: firm_internal
  # model: firm-gpt-4
  # base_url: https://llm-gateway.yourfirm.com/v1
  # api key comes from FIRM_LLM_API_KEY env var

executor:
  type: generic       # works with any LLM provider
  max_turns: 10

mcp:
  type: local         # in-memory Python tools. Switch to "remote" when real MCP servers are available.
